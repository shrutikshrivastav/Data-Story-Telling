<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DataStory AI | Intelligent Insights</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #4F46E5; /* Indigo */
            --bg-light: #F8FAFC;
            --surface: #FFFFFF;
            --text-main: #1E293B;
            --border-color: #E2E8F0;
        }

        body { 
            background: var(--bg-light); 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            color: var(--text-main);
        }

        /* Professional Header Glow */
        .glass-nav {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border-color);
        }

        /* Elegant Cards */
        .premium-card {
            background: var(--surface);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -2px rgba(0, 0, 0, 0.05);
            transition: all 0.3s ease;
        }
        .premium-card:hover {
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        /* Tab Styling */
        .tab-btn {
            position: relative;
            padding: 0.75rem 1.25rem;
            color: #64748B;
            font-weight: 500;
            transition: all 0.2s;
        }
        .tab-btn.active {
            color: var(--primary);
        }
        .tab-btn.active::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            right: 0;
            height: 2px;
            background: var(--primary);
            border-radius: 10px;
        }

        /* Table Styling */
        .custom-table th {
            background: #F1F5F9;
            color: #475569;
            font-size: 11px;
            text-transform: uppercase;
            padding: 12px 16px;
            border-bottom: 2px solid var(--border-color);
        }
        .custom-table td {
            padding: 12px 16px;
            border-bottom: 1px solid var(--border-color);
            font-size: 13px;
        }

        /* Loading Animation */
        .loader {
            border-top-color: var(--primary);
            animation: spinner 0.8s linear infinite;
        }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .hidden { display: none; }
    </style>
</head>
<body class="min-h-screen">

    <header class="glass-nav sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 h-18 py-4 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="bg-indigo-600 p-2.5 rounded-xl shadow-lg shadow-indigo-200">
                    <i class="fas fa-layer-group text-white text-xl"></i>
                </div>
                <div>
                    <h1 class="text-xl font-bold tracking-tight text-slate-900">DataStory<span class="text-indigo-600">.AI</span></h1>
                    <p class="text-[10px] text-slate-500 uppercase tracking-widest font-bold">Premium Analytics</p>
                </div>
            </div>

            <nav id="nav-tabs" class="hidden flex gap-2">
                <button onclick="switchTab('data')" id="tab-data" class="tab-btn active">
                    <i class="fas fa-table-list mr-2"></i>Dataset
                </button>
                <button onclick="switchTab('viz')" id="tab-viz" class="tab-btn">
                    <i class="fas fa-chart-line mr-2"></i>Visuals
                </button>
                <button onclick="switchTab('nar')" id="tab-nar" class="tab-btn">
                    <i class="fas fa-wand-sparkles mr-2"></i>AI Narrative
                </button>
            </nav>

            <button onclick="location.reload()" class="bg-white hover:bg-slate-50 text-slate-700 px-4 py-2 rounded-lg text-sm font-semibold border border-slate-200 transition-all flex items-center gap-2">
                <i class="fas fa-plus"></i> New Project
            </button>
        </div>
    </header>

    <main class="max-w-7xl mx-auto p-8">
        
        <div id="upload-container" class="mt-12 max-w-2xl mx-auto text-center">
            <div class="mb-10">
                <h2 class="text-4xl font-extrabold text-slate-900 mb-4">Transform data into <span class="text-indigo-600">decisions.</span></h2>
                <p class="text-slate-500 text-lg">Upload your spreadsheet and let our AI handle the cleaning, analysis, and storytelling.</p>
            </div>
            
            <label class="premium-card block p-16 border-dashed border-2 border-indigo-100 bg-white hover:border-indigo-400 hover:bg-indigo-50/30 cursor-pointer transition-all group">
                <input type="file" class="hidden" onchange="handleUpload(this)">
                <div class="w-20 h-20 bg-indigo-50 rounded-2xl flex items-center justify-center mb-6 mx-auto group-hover:scale-110 transition-transform">
                    <i class="fas fa-cloud-arrow-up text-3xl text-indigo-600"></i>
                </div>
                <h4 class="text-slate-800 font-bold text-xl mb-1">Select Dataset</h4>
                <p class="text-slate-500 text-sm">Drop your CSV or Excel file here</p>
            </label>
        </div>

        <div id="content-area" class="hidden space-y-8">
            
            <div class="flex flex-wrap items-center justify-between gap-4">
                <div>
                    <h3 id="file-name-display" class="text-2xl font-bold text-slate-900">dataset_report.csv</h3>
                    <p id="file-meta" class="text-sm text-slate-500 font-medium"></p>
                </div>
                <button id="download-btn" class="bg-indigo-600 hover:bg-indigo-700 text-white px-5 py-2.5 rounded-xl text-sm font-bold shadow-lg shadow-indigo-200 transition-all">
                    <i class="fas fa-download mr-2"></i> Download Cleaned CSV
                </button>
            </div>

            <div id="section-data" class="premium-card overflow-hidden">
                <div class="overflow-x-auto max-h-[600px]">
                    <table class="w-full custom-table" id="data-table">
                        <thead><tr id="table-headers"></tr></thead>
                        <tbody id="table-body"></tbody>
                    </table>
                </div>
            </div>

            <div id="section-viz" class="hidden grid grid-cols-1 lg:grid-cols-2 gap-8">
                <div class="premium-card p-6" id="chart-main_bar"></div>
                <div class="premium-card p-6" id="chart-distribution"></div>
                <div class="premium-card p-6 lg:col-span-2" id="chart-correlation"></div>
            </div>

            <div id="section-nar" class="hidden max-w-4xl mx-auto grid gap-6">
                </div>

        </div>
    </main>

    <script>
        // 1. Smooth Tab Switching
        function switchTab(tabId) {
            ['data', 'viz', 'nar'].forEach(id => {
                document.getElementById(`section-${id}`).classList.add('hidden');
                document.getElementById(`tab-${id}`).classList.remove('active');
            });
            
            document.getElementById(`section-${tabId}`).classList.remove('hidden');
            document.getElementById(`tab-${tabId}`).classList.add('active');

            // Force charts to fit container on switch
            if (tabId === 'viz') {
                window.dispatchEvent(new Event('resize'));
            }
        }

        // 2. Upload and Backend Communication
        async function handleUpload(input) {
            const file = input.files[0];
            if (!file) return;

            const formData = new FormData();
            formData.append('file', file);

            // Professional Loading State
            const container = document.getElementById('upload-container');
            container.innerHTML = `
                <div class="py-20 flex flex-col items-center">
                    <div class="loader ease-linear rounded-full border-4 border-t-4 border-gray-200 h-16 w-16 mb-6"></div>
                    <h3 class="text-xl font-bold text-slate-800">Processing Pipeline</h3>
                    <p class="text-slate-500">Cleansing data and generating AI narratives...</p>
                </div>
            `;

            try {
                const response = await fetch('/upload', { method: 'POST', body: formData });
                const data = await response.json();

                if (!response.ok || data.error) throw new Error(data.error || "Server Error");

                renderDashboard(data);

            } catch (error) {
                alert("Pipeline Interrupted: " + error.message);
                location.reload();
            }
        }

        // 3. Render Data to Professional UI
        function renderDashboard(data) {
            document.getElementById('upload-container').classList.add('hidden');
            document.getElementById('nav-tabs').classList.remove('hidden');
            document.getElementById('content-area').classList.remove('hidden');

            document.getElementById('file-name-display').innerText = data.filename;
            document.getElementById('file-meta').innerText = 
                `${data.summary.rows} Records • ${data.summary.cols} Columns • Data Integrity: ${data.summary.score}%`;

            // Render Table
            const headers = document.getElementById('table-headers');
            const body = document.getElementById('table-body');
            headers.innerHTML = data.table.cols.map(c => `<th>${c.header}</th>`).join('');
            body.innerHTML = data.table.rows.map(row => `
                <tr>${data.table.cols.map(c => `<td>${row[c.field] || '-'}</td>`).join('')}</tr>
            `).join('');

            // Render Elegant Charts (Light Theme Layout)
            const layoutBase = {
                paper_bgcolor: 'rgba(0,0,0,0)',
                plot_bgcolor: 'rgba(0,0,0,0)',
                font: { family: 'Plus Jakarta Sans', color: '#475569' },
                margin: { t: 40, r: 20, l: 40, b: 40 }
            };

            const config = { responsive: true, displayModeBar: false };

            Object.keys(data.charts).forEach(id => {
                const chartData = data.charts[id];
                // Update chart layout for light mode
                const elegantLayout = {...chartData.layout, ...layoutBase};
                Plotly.newPlot(`chart-${id}`, chartData.data, elegantLayout, config);
            });

            // Render Narrative AI Cards
            const narBox = document.getElementById('section-nar');
            narBox.innerHTML = data.narrative.map(item => `
                <div class="premium-card p-6 flex gap-6 items-start hover:border-indigo-200 transition-all">
                    <div class="bg-indigo-50 p-4 rounded-2xl text-indigo-600">
                        <i class="fas fa-lightbulb text-xl"></i>
                    </div>
                    <div>
                        <h4 class="text-lg font-bold text-slate-900 mb-1">${item.title}</h4>
                        <p class="text-slate-600 leading-relaxed text-sm">${item.desc}</p>
                    </div>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
