<div id="section-viz" class="hidden grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
    <div class="premium-card p-4"><div id="chart-main_bar" class="h-80"></div></div>
    <div class="premium-card p-4"><div id="chart-distribution" class="h-80"></div></div>
    <div class="premium-card p-4"><div id="chart-outliers" class="h-80"></div></div>
    <div class="premium-card p-4 lg:col-span-2"><div id="chart-trend" class="h-80"></div></div>
    <div class="premium-card p-4"><div id="chart-correlation" class="h-80"></div></div>
</div>

<script>
    // Download function ko script tag mein add karein
    function setupDownload() {
        const btn = document.getElementById('download-btn');
        btn.onclick = () => {
            window.location.href = '/download';
        };
    }

    // Isko renderDashboard function ke andar call karein
    function renderDashboard(data) {
        // ... purana render code ...
        setupDownload(); // Activate download button
        
        // Re-render all 5 charts
        const config = { responsive: true, displayModeBar: false };
        Object.keys(data.charts).forEach(id => {
            Plotly.newPlot(`chart-${id}`, data.charts[id].data, data.charts[id].layout, config);
        });
    }
</script>
