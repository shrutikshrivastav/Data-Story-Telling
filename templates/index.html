<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Data Storytelling Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
</head>
<body class="bg-gradient-to-br from-gray-900 via-black to-gray-800 text-white min-h-screen flex flex-col items-center justify-center p-6">

  <div class="w-full max-w-5xl">
    <h1 class="text-4xl font-bold text-center mb-8 bg-clip-text text-transparent bg-gradient-to-r from-purple-400 to-pink-600">AI-Powered Data Storytelling</h1>

    <!-- Upload Section -->
    <div class="border-2 border-dashed border-gray-600 rounded-xl p-10 text-center backdrop-blur-md bg-white/5 hover:bg-white/10 transition">
      <input type="file" id="fileInput" class="hidden" />
      <label for="fileInput" class="cursor-pointer text-lg font-semibold text-gray-300 hover:text-white">Drag & Drop or Click to Upload CSV/Excel</label>
    </div>

    <!-- Dashboard Sections -->
    <div id="dashboard" class="mt-10 space-y-10 hidden">
      <!-- Data Phase -->
      <div id="dataPhase" class="p-6 rounded-xl bg-white/10 backdrop-blur-md shadow-lg">
        <h2 class="text-2xl font-bold mb-4">📊 Data Quality Summary</h2>
        <div id="summaryCards" class="grid grid-cols-2 md:grid-cols-3 gap-6"></div>
      </div>

      <!-- Visualization Phase -->
      <div id="vizPhase" class="p-6 rounded-xl bg-white/10 backdrop-blur-md shadow-lg">
        <h2 class="text-2xl font-bold mb-4">📈 Visualizations</h2>
        <div id="visualizations" class="space-y-6"></div>
      </div>

      <!-- Narrative Phase -->
      <div id="narrativePhase" class="p-6 rounded-xl bg-white/10 backdrop-blur-md shadow-lg">
        <h2 class="text-2xl font-bold mb-4">📝 Narrative Insights</h2>
        <ul id="narrative" class="list-disc pl-6 space-y-2"></ul>
      </div>
    </div>
  </div>

  <script>
    document.getElementById("fileInput").addEventListener("change", async function() {
      const file = this.files[0];
      if (!file) return;

      const formData = new FormData();
      formData.append("file", file);
