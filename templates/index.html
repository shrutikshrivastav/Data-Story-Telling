<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DataStory | Intelligent Analytics</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: #020617; font-family: 'Inter', sans-serif; color: #e2e8f0; }
        .tab-active { color: #38bdf8; border-bottom: 2px solid #38bdf8; background: rgba(56, 189, 248, 0.05); }
        .glass-card { background: #0f172a; border: 1px solid #1e293b; border-radius: 12px; }
        .custom-table th { background: #1e293b; color: #38bdf8; position: sticky; top: 0; padding: 12px; text-align: left; font-size: 12px; text-transform: uppercase; }
        .custom-table td { padding: 10px 12px; border-bottom: 1px solid #1e293b; font-size: 13px; color: #94a3b8; }
        .status-dot { width: 8px; height: 8px; background: #22c55e; border-radius: 50%; box-shadow: 0 0 8px #22c55e; }
    </style>
</head>
<body class="min-h-screen">

    <header class="border-b border-slate-800 bg-[#020617]/80 backdrop-blur-md sticky top-0 z-50">
        <div class="max-w-[1600px] mx-auto px-6 h-16 flex items-center justify-between">
            <div class="flex items-center gap-4">
                <div class="bg-blue-600 p-2 rounded-lg"><i class="fas fa-cube text-white"></i></div>
                <div>
                    <h1 class="text-lg font-bold tracking-tight">DataStory</h1>
                    <p class="text-[10px] text-blue-400 uppercase tracking-widest font-bold">Intelligent Analytics</p>
                </div>
            </div>

            <div id="nav-tabs" class="hidden flex gap-8 h-full items-center">
                <button onclick="switchTab('data')" id="tab-data" class="h-full px-4 text-sm font-medium transition-all tab-active"><i class="fas fa-table mr-2"></i>Data</button>
                <button onclick="switchTab('viz')" id="tab-viz" class="h-full px-4 text-sm font-medium transition-all text-slate-400"><i class="fas fa-chart-bar mr-2"></i>Visualizations</button>
                <button onclick="switchTab('nar')" id="tab-nar" class="h-full px-4 text-sm font-medium transition-all text-slate-400"><i class="fas fa-magic mr-2"></i>Narrative</button>
            </div>

            <div class="flex items-center gap-6">
                <div class="flex items-center gap-2 bg-slate-900/50 px-3 py-1.5 rounded-full border border-slate-800">
                    <div class="status-dot"></div>
                    <span class="text-[11px] font-bold text-green-500 uppercase">System Online</span>
                </div>
                <button onclick="location.reload()" class="bg-slate-800 hover:bg-slate-700 text-white px-4 py-2 rounded-md text-sm font-medium transition-all">
                    <i class="fas fa-plus mr-2"></i> New File
                </button>
            </div>
        </div>
    </header>

    <main class="max-w-[1600px] mx-auto p-6">
        
        <div id="upload-container" class="mt-20 max-w-xl mx-auto text-center">
            <h2 class="text-3xl font-bold mb-4">Start your Data Journey</h2>
            <p class="text-slate-400 mb-8 text-sm">Upload your dataset to generate automated insights and interactive dashboards.</p>
            <label class="glass-card flex flex-col items-center justify-center p-20 border-dashed border-2 border-slate-700 cursor-pointer hover:border-blue-500 transition-all group">
                <input type="file" class="hidden" onchange="handleUpload(this)">
                <i class="fas fa-cloud-upload-alt text-4xl mb-4 text-slate-500 group-hover:text-blue-500"></i>
                <span class="text-slate-300 font-medium">Click to select CSV or Excel</span>
                <span class="text-xs text-slate-500 mt-2">Max file size: 50MB</span>
            </label>
        </div>

        <div id="content-area" class="hidden space-y-6">
            
            <div class="flex items-center gap-4 text-slate-500 text-xs font-mono bg-slate-900/30 p-3 rounded-lg border border-slate-800">
                <i class="fas fa-file-csv text-blue-400"></i>
                <span id="file-name-display">sales_data.csv</span>
                <span class="text-slate-700">|</span>
                <span id="file-meta">100 rows shown • 14 columns</span>
            </div>

            <div id="section-data" class="animate-in fade-in duration-500">
                <div class="glass-card overflow-hidden">
                    <div class="overflow-x-auto max-h-[600px]">
                        <table class="w-full custom-table" id="data-table">
                            <thead><tr id="table-headers"></tr></thead>
                            <tbody id="table-body"></tbody>
                        </table>
                    </div>
                </div>
            </div>

            <div id="section-viz" class="hidden grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="glass-card p-6 h-[450px]" id="chart-main_bar"></div>
                <div class="glass-card p-6 h-[450px]" id="chart-distribution"></div>
                <div class="glass-card p-6 h-[450px] md:col-span-2" id="chart-correlation"></div>
            </div>

            <div id="section-nar" class="hidden max-w-4xl mx-auto space-y-4">
                <div id="narrative-list" class="grid gap-4"></div>
            </div>

        </div>
    </main>

    <script>
        function switchTab(tab) {
            ['data', 'viz', 'nar'].forEach(t => {
                document.getElementById(`section-${t}`).classList.add('hidden');
                document.getElementById(`tab-${t}`).classList.remove('tab-active', 'text-white');
                document.getElementById(`tab-${t}`).classList.add('text-slate-400');
            });
            document.getElementById(`section-${tab}`).classList.remove('hidden');
            document.getElementById(`tab-${tab}`).classList.add('tab-active', 'text-white');
            // Fix Plotly resize when switching tabs
            if(tab === 'viz') window.dispatchEvent(new Event('resize'));
        }

        async function handleUpload(input) {
            if (!input.files[0]) return;
            const formData = new FormData();
            formData.append('file', input.files[0]);

            document.getElementById('upload-container').innerHTML = `<div class="py-20 text-blue-500 animate-pulse font-bold tracking-widest">ANALYZING DATASET...</div>`;

            try {
                const res = await fetch('/upload', { method: 'POST', body: formData });
                const data = await res.json();
                renderDashboard(data);
            } catch (err) { alert("Error uploading file."); location.reload(); }
        }

        function renderDashboard(data) {
            document.getElementById('upload-container').classList.add('hidden');
            document.getElementById('nav-tabs').classList.remove('hidden');
            document.getElementById('content-area').classList.remove('hidden');

            document.getElementById('file-name-display').innerText = data.filename;
            document.getElementById('file-meta').innerText = `${data.summary.rows} rows analyzed • ${data.summary.cols} columns • Quality Score: ${data.summary.score}%`;

            // Render Table
            const headers = document.getElementById('table-headers');
            const body = document.getElementById('table-body');
            headers.innerHTML = data.table.cols.map(c => `<th>${c.header}</th>`).join('');
            body.innerHTML = data.table.rows.map(row => 
                `<tr>${data.table.cols.map(c => `<td>${row[c.field] || '-'}</td>`).join('')}</tr>`
            ).join('');

            // Render Charts
            const config = { responsive: true, displayModeBar: false };
            Object.keys(data.charts).forEach(id => {
                Plotly.newPlot(`chart-${id}`, data.charts[id].data, data.charts[id].layout, config);
            });

            // Render Narrative
            document.getElementById('narrative-list').innerHTML = data.narrative.map(n => `
                <div class="glass-card p-6 flex gap-4">
                    <div class="w-10 h-10 rounded-full bg-blue-500/10 flex items-center justify-center text-blue-500 shrink-0">
                        <i class="fas fa-lightbulb"></i>
                    </div>
                    <div>
                        <h4 class="font-bold text-white mb-1">${n.title}</h4>
                        <p class="text-sm text-slate-400 leading-relaxed">${n.desc}</p>
                    </div>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
